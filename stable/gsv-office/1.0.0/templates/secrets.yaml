{{/* GSV Office — Secrets */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: gsv-office
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  DB_PASSWORD: "{{ .Values.postgresql.auth.password }}"
  REDIS_PASSWORD: "{{ .Values.redis.password }}"
  MINIO_ROOT_USER: "{{ .Values.minio.rootUser }}"
  MINIO_ROOT_PASSWORD: "{{ .Values.minio.rootPassword }}"
  JWT_ACCESS_SECRET: "{{ .Values.jwt.accessSecret }}"
  JWT_REFRESH_SECRET: "{{ .Values.jwt.refreshSecret }}"
  JWT_ACCESS_EXPIRY: "{{ .Values.jwt.accessExpiry }}"
  JWT_REFRESH_EXPIRY: "{{ .Values.jwt.refreshExpiry }}"
  SESSION_SECRET: "{{ .Values.sessionSecret }}"
  ADMIN_EMAIL: "{{ .Values.adminEmail }}"
  ADMIN_PASSWORD: "{{ .Values.adminPassword }}"
  ADMIN_NAME: "{{ .Values.adminName }}"
  TURN_USERNAME: "{{ .Values.coturn.username }}"
  TURN_PASSWORD: "{{ .Values.coturn.password }}"
