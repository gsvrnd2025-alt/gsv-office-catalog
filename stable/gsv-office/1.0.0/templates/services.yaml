{{/* GSV Office — Kubernetes Services */}}

# ── Nginx (Web Portal — External Access) ───────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-nginx
  labels:
    app.kubernetes.io/name: gsv-office
    app.kubernetes.io/component: nginx
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: gsv-office
    app.kubernetes.io/component: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: {{ .Values.service.http.port }}
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      nodePort: {{ .Values.service.https.port }}
      protocol: TCP
---
# ── API (Internal Only) ────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app.kubernetes.io/name: gsv-office
    app.kubernetes.io/component: api
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gsv-office
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
---
# ── PostgreSQL (Internal Only) ─────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres
  labels:
    app.kubernetes.io/name: gsv-office
    app.kubernetes.io/component: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: gsv-office
    app.kubernetes.io/component: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# ── Redis (Internal Only) ──────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis
  labels:
    app.kubernetes.io/name: gsv-office
    app.kubernetes.io/component: redis
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: gsv-office
    app.kubernetes.io/component: redis
  ports:
    - port: 6379
      targetPort: 6379
---
# ── MinIO (Internal Only) ──────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-minio
  labels:
    app.kubernetes.io/name: gsv-office
    app.kubernetes.io/component: minio
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: gsv-office
    app.kubernetes.io/component: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
